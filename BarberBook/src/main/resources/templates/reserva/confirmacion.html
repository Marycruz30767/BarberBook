<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Confirmación - BarberBook</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card mx-auto" style="max-width: 650px;">
        <div class="card-header bg-success text-white text-center">
            <h4>Reserva confirmada</h4>
        </div>

        <div class="card-body">
            <p><strong>Cliente:</strong> <span th:text="${reserva.usuario.nombre + ' ' + reserva.usuario.apellido}"></span></p>
            <p><strong>Servicio:</strong> <span th:text="${reserva.servicio.nombre}"></span></p>
            <p><strong>Fecha:</strong> <span th:text="${reserva.fecha}"></span></p>
            <p><strong>Hora:</strong> <span th:text="${reserva.hora}"></span></p>
            <p><strong>Barbero:</strong> <span th:text="${reserva.empleado.usuario.nombre}"></span></p>
            <p><strong>Estado:</strong> <span th:text="${reserva.estado}"></span></p>

            <div class="text-center mt-4">
                <a th:href="@{/servicio/listado}" class="btn btn-dark">Volver a servicios</a>
                <a th:href="@{/reserva/nueva}" class="btn btn-outline-dark">Hacer otra reserva</a>
            </div>
        </div>
    </div>

</div>

</body>
</html>
