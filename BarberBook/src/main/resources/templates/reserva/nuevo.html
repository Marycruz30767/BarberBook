<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nueva reserva - BarberBook</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card mx-auto" style="max-width: 700px;">
        <div class="card-header bg-dark text-white">
            <h4>Reservar cita</h4>
        </div>

        <div class="card-body">
            <form th:action="@{/reserva/guardar}" th:object="${reserva}" method="post">

                <div class="mb-3">
                    <label>Servicio</label>
                    <select th:field="*{servicio.idServicio}" class="form-select" required>
                        <option value="">Seleccione un servicio</option>
                        <option th:each="servicio : ${servicios}"
                                th:value="${servicio.idServicio}"
                                th:text="${servicio.nombre + ' - ₡' + servicio.precio}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>Horario disponible</label>
                    <select th:field="*{horario.idHorario}" class="form-select" required>
                        <option value="">Seleccione un horario</option>
                        <option th:each="horario : ${horarios}"
                                th:value="${horario.idHorario}"
                                th:text="${horario.fecha + ' - ' + horario.hora + ' - ' + horario.empleado.usuario.nombre}">
                        </option>
                    </select>
                </div>

                <button type="submit" class="btn btn-dark">Confirmar reserva</button>
                <a th:href="@{/servicio/listado}" class="btn btn-secondary">Regresar</a>

            </form>
        </div>
    </div>

</div>

</body>
</html>
