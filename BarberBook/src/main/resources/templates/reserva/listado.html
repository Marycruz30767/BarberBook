<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Mis reservas - BarberBook</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>

        <div class="container mt-5">

            <div class="card mx-auto" style="max-width: 900px;">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <h4 class="mb-0">Mis reservas</h4>
                    <a th:href="@{/reserva/nueva}" class="btn btn-sm btn-outline-light">Nueva reserva</a>
                </div>

                <div class="card-body">

                    <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <div th:if="${#lists.isEmpty(reservas)}" class="text-center text-muted py-4">
                        Todavía no tiene citas registradas.
                    </div>

                    <table class="table table-hover align-middle" th:unless="${#lists.isEmpty(reservas)}">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Hora</th>
                                <th>Servicio</th>
                                <th>Barbero</th>
                                <th>Estado</th>
                                <th class="text-end">Acción</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="reserva : ${reservas}">
                                <td th:text="${reserva.fecha}"></td>
                                <td th:text="${reserva.hora}"></td>
                                <td th:text="${reserva.servicio.nombre}"></td>
                                <td th:text="${reserva.empleado.usuario.nombre}"></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${reserva.estado == 'Pendiente'} ? 'bg-warning text-dark' : (${reserva.estado == 'Cancelada'} ? 'bg-secondary' : 'bg-success')"
                                          th:text="${reserva.estado}">
                                    </span>
                                </td>
                                <td class="text-end">
                                    <form th:if="${reserva.estado == 'Pendiente'}"
                                          th:action="@{/reserva/cancelar/{id}(id=${reserva.idReserva})}"
                                          method="post"
                                          onsubmit="return confirm('¿Confirma que desea cancelar esta cita?');">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">Cancelar</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="text-center mt-3">
                        <a th:href="@{/servicio/listado}" class="btn btn-secondary">Volver a servicios</a>
                    </div>

                </div>
            </div>

        </div>

    </body>
</html>
