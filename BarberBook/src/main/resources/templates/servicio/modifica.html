<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Servicio - BarberBook</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="card mx-auto" style="max-width: 600px;">
        <div class="card-header bg-dark text-white">
            <h4>Datos del servicio</h4>
        </div>

        <div class="card-body">
            <form th:action="@{/servicio/guardar}" th:object="${servicio}" method="post">

                <input type="hidden" th:field="*{idServicio}">

                <div class="mb-3">
                    <label>Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Descripción</label>
                    <input type="text" th:field="*{descripcion}" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Duración en minutos</label>
                    <input type="number" th:field="*{duracion}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Precio</label>
                    <input type="number" step="0.01" th:field="*{precio}" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-dark">Guardar</button>
                <a th:href="@{/servicio/listado}" class="btn btn-secondary">Regresar</a>
            </form>
        </div>
    </div>
</div>

</body>
</html>
