<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Servicios - BarberBook</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Servicios disponibles</h2>
        <a th:href="@{/servicio/nuevo}" class="btn btn-dark">Nuevo servicio</a>
    </div>

    <div class="mb-3">
        <a th:href="@{/reserva/nueva}" class="btn btn-outline-dark">Reservar cita</a>
        <a th:href="@{/reserva/mis-reservas}" class="btn btn-outline-secondary">Mis reservas</a>
        <a th:href="@{/usuario/perfil}" class="btn btn-outline-secondary">Mi perfil</a>
        <a th:href="@{/logout}" class="btn btn-outline-danger">Salir</a>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Duración</th>
            <th>Precio</th>
            <th>Opciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="servicio : ${servicios}">
            <td th:text="${servicio.nombre}"></td>
            <td th:text="${servicio.descripcion}"></td>
            <td th:text="${servicio.duracion + ' min'}"></td>
            <td th:text="${'₡' + servicio.precio}"></td>
            <td>
                <a th:href="@{/servicio/modificar/}+${servicio.idServicio}" class="btn btn-sm btn-primary">Editar</a>
                <a th:href="@{/servicio/eliminar/}+${servicio.idServicio}" class="btn btn-sm btn-danger">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
