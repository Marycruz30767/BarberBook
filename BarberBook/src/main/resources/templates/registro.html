<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registro - BarberBook</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="card mx-auto" style="max-width: 550px;">
        <div class="card-header text-center bg-dark text-white">
            <h4>Crear cuenta</h4>
        </div>

        <div class="card-body">
            <form th:action="@{/registro/guardar}" method="post">
                <div class="mb-3">
                    <label>Nombre</label>
                    <input type="text" name="nombre" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Apellido</label>
                    <input type="text" name="apellido" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Correo electrónico</label>
                    <input type="email" name="correo" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Teléfono</label>
                    <input type="text" name="telefono" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Contraseña</label>
                    <input type="password" name="contrasena" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-dark w-100">Crear cuenta</button>
            </form>

            <div class="text-center mt-3">
                <a th:href="@{/login}">Ya tengo cuenta</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
